<div class="my-skill-left-container">
    <div class="skill" *ngFor="let icon of icons; let i = index">
        <img src="/assets/img/{{ icon }}.svg" alt="">
        <p>{{ name[i] }}</p>
    </div>
</div>
<div class="my-skill-right-container">
    <h2>My skills</h2>
    <p>I have grown my frontend developments skills that have allowed me to create different real projects</p>
    <div class="btn-container">
        <button>Get in touch</button>
    </div>
</div>
